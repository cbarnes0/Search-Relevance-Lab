services:
  postgres:
    image: postgres:16.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  typesense:
    image: typesense/typesense:27.1
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    command: --data-dir /data --api-key ${TYPESENSE_API_KEY}
    ports:
      - "${TYPESENSE_PORT:-8108}:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8108"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.9.4
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: ./services/api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      HF_HOME: /data/hf_cache
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ./services/api:/app
      # Same model cache the indexer uses — load weights, never download.
      - ./data/hf_cache:/data/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  indexer:
    build: ./services/indexer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      IR_DATASETS_HOME: /data/ir_datasets
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIM: ${EMBEDDING_DIM}
      HF_HOME: /data/hf_cache
      # Model weights are pre-downloaded to the mounted cache — never hit the network.
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # Live source: indexer scripts appear without rebuilding the image.
      # (Deps live in /opt/venv, outside /app, so this mount doesn't shadow them.)
      - ./services/indexer:/app
      # Bind mount: host-downloaded dataset cache appears live in the container.
      - ./data/ir_datasets:/data/ir_datasets
      # Bind mount: host-downloaded model weights (no HF download inside container).
      - ./data/hf_cache:/data/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    profiles:
      - tools

  web:
    build: ./apps/web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      API_URL: http://api:8000
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  typesense_data:
  qdrant_data:
  web_node_modules:
